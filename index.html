<script>
    // ========== 邀請碼驗證 ==========
    const VALID_CODES = ["ANNA2026", "DSE2026", "STUDENT01"];

                throw new Error("Invalid invite code");
            }
        }
    })();

    // ==================== 16篇完整題庫 ====================
    const chapters = ["登樓","山居秋暝","月下獨酌","念奴嬌·赤壁懷古","聲聲慢·秋情","青玉案·元夕","魚我所欲也","勸學","論仁論孝論君子","師說","出師表","逍遙遊","六國論","岳陽樓記","廉頗藺相如列傳","始得西山宴遊記"];
    const authors = ["杜甫","王維","李白","蘇軾","李清照","辛棄疾","孟子","荀子","孔子","韓愈","諸葛亮","莊子","蘇洵","范仲淹","司馬遷","柳宗元"];
    
    let db = {};
    for(let i=0;i<chapters.length;i++) db[chapters[i]] = { author: authors[i], items: { "語譯": [], "文章大意": [], "修辭手法": [] } };
    
    // ---------- 1. 登樓 (完整題目，從用戶提供的文檔轉換) ----------
    db["登樓"].items["語譯"] = [
        { q: "「萬方多難此登臨」中的「萬方多難」意思是？", a: ["四方百姓疾苦","天下多災多難","國家戰亂頻仍","朝廷內外交困"], c: 1, n: "賞析：以「萬方多難」作為登臨的背景。" },
        { q: "「錦江春色來天地」中的「錦江」是？", a: ["一種絲織品","岷江的支流，流經成都","長江的別稱","杜甫草堂附近的河流"], c: 1, n: "注釋1：錦江：岷江的支流，大部分河段流經成都。" },
        { q: "「玉壘浮雲變古今」中的「玉壘」是？", a: ["一種玉器","山名，位於四川灌縣西北","城樓名","關隘名"], c: 1, n: "注釋2：玉壘：山名。" },
        { q: "「北極朝廷終不改」中的「北極」比喻？", a: ["北方邊境","北方的朝廷","北極星","帝王"], c: 1, n: "注釋3：北極：北極星，比喻北方的朝廷。" },
        { q: "「西山寇盜莫相侵」中的「西山寇盜」指？", a: ["回紇","吐蕃","契丹","西夏"], c: 1, n: "注釋4：西山寇盜：指吐蕃。" },
        { q: "「可憐後主還祠廟」中的「後主」指？", a: ["劉備","劉禪","劉表","劉璋"], c: 1, n: "注釋5：後主：三國時期蜀漢的後主劉禪。" },
        { q: "「日暮聊為梁甫吟」中的「梁甫吟」是？", a: ["一種樂器","諸葛亮躬耕時愛吟唱的歌謠","杜甫自創的詩題","一種祭祀音樂"], c: 1, n: "注釋6：《梁甫吟》：據《三國志·蜀志》，諸葛亮在隆中躬耕時，好為《梁父吟》。" },
        { q: "「花近高樓傷客心」中的「客」指？", a: ["遊客","杜甫自己（客居在外）","客人","旅人"], c: 1, n: "賞析：春光再度，而詩人依然客居在外。" }
    ];
    db["登樓"].items["文章大意"] = [
        { q: "杜甫寫作《登樓》時，唐朝正面對哪個外族的大舉入侵？", a: ["回紇","吐蕃","契丹","突厥"], c: 1, n: "背景資料：吐蕃掠取了河西隴右之地，直逼長安。" },
        { q: "當時朝廷因宦官程元振沒有及時進奏，導致？", a: ["代宗被逼倉皇逃奔陝州","長安被攻陷","代宗被俘","郭子儀戰死"], c: 0, n: "背景資料：以致代宗被逼倉皇逃奔陝州。" },
        { q: "「錦江春色來天地，玉壘浮雲變古今」一聯蘊含的寓意是？", a: ["春色常在，時勢變化不定","江山易改，本性難移","人生苦短，及時行樂","朝廷穩固，外族可滅"], c: 0, n: "賞析：春色是亙古常新的江山，浮雲是變化不斷的時事。" },
        { q: "「北極朝廷終不改，西山寇盜莫相侵」表達了詩人怎樣的情感？", a: ["對朝廷的絕望","對吐蕃的恐懼","對朝廷的信心及對外族入侵的警告","對隱居的嚮往"], c: 2, n: "賞析：儘管吐蕃不斷相侵，朝廷仍不會受到動搖。" },
        { q: "尾聯提及後主劉禪，目的是？", a: ["讚揚劉禪","藉劉禪信任宦官而亡國，暗諷代宗信任宦官","懷念三國歷史","批評諸葛亮"], c: 1, n: "賞析：藉劉禪信任宦官而亡國一事，暗諷代宗信任宦官程元振、魚朝恩。" },
        { q: "詩人「日暮聊為梁甫吟」，吟誦《梁甫吟》是為了？", a: ["抒發隱居之志","懷念諸葛亮，寄望朝廷任用賢才","排解心中鬱悶","諷刺當權者"], c: 1, n: "賞析：懷念諸葛亮之雄才偉略，寄望朝廷能任用賢才。" },
        { q: "葉夢得《石林詩話》稱讚此詩「氣象雄渾」，指的是哪一聯？", a: ["首聯","頷聯（錦江春色來天地，玉壘浮雲變古今）","頸聯","尾聯"], c: 1, n: "賞析：七言難於氣象雄渾……自老杜『錦江春色來天地，玉壘浮雲變古今』之後。" },
        { q: "詩中「北極」與「西山」形成什麼關係？", a: ["並列","對比","因果","轉折"], c: 1, n: "賞析：以「北極朝廷」和「西山寇盜」作人事的對比。" },
        { q: "《登樓》是七言律詩，其第二聯（第三、四句）稱為？", a: ["首聯","頷聯","頸聯","尾聯"], c: 1, n: "律詩結構：首聯（1,2句）、頷聯（3,4句）、頸聯（5,6句）、尾聯（7,8句）。" },
        { q: "《登樓》押的是什麼韻？", a: ["平聲韻（心、臨、今、侵、吟）","仄聲韻","入聲韻","換韻"], c: 0, n: "詩中押「心」「臨」「今」「侵」「吟」，同屬平聲侵韻。" }
    ];
    db["登樓"].items["修辭手法"] = [
        { q: "「錦江春色來天地，玉壘浮雲變古今」運用了？", a: ["對偶與誇張","對偶與對比（天地vs古今）","排比與比喻","擬人與借代"], c: 1, n: "賞析：以江水和山雲、天地和古今相對，是對偶與對比。" },
        { q: "「北極朝廷終不改，西山寇盜莫相侵」運用了？", a: ["比喻與對偶","比喻與擬人","對偶與對比","借代與誇張"], c: 0, n: "「北極」比喻朝廷，上下句對偶。" },
        { q: "「花近高樓傷客心」中的「傷」字，使景物帶有情感，這種手法是？", a: ["移情","擬人","誇張","借代"], c: 0, n: "將詩人的悲傷投射到花上。" },
        { q: "「玉壘浮雲變古今」中的「浮雲」象徵？", a: ["詩人的漂泊","捉摸不定的時勢變化","朝廷的動盪","外族的猖獗"], c: 1, n: "賞析：象徵捉摸不定的時勢變化。" },
        { q: "本詩一、三、五句與二、四、六句形成三層對比，綜合運用了什麼手法？", a: ["興、比、賦","比、賦、誇","賦、比、興","興、賦、喻"], c: 0, n: "賞析：綜合運用了興、比、賦三種藝術手法。" },
        { q: "「可憐後主還祠廟」運用了？", a: ["用典","借代","比喻","誇張"], c: 0, n: "引用劉禪的典故。" }
    ];

    // ---------- 2. 山居秋暝 (完整題目) ----------
    db["山居秋暝"].items["語譯"] = [
        { q: "「山居秋暝」中的「暝」意思是？", a: ["明亮","黃昏時候","夜晚","昏暗"], c: 1, n: "注釋1：暝：黃昏時候。" },
        { q: "「空山新雨後」中的「空山」意思是？", a: ["空曠的山","空無一人的山","幽靜的山","空靈的山"], c: 2, n: "賞析：強調幽靜。" },
        { q: "「天氣晚來秋」中的「晚來秋」意思是？", a: ["秋天來了","傍晚時分秋意漸濃","晚上秋天","秋天傍晚"], c: 1, n: "賞析：傍晚秋涼。" },
        { q: "「竹喧歸浣女」中的「竹喧」意思是？", a: ["竹子搖動","竹林中的喧鬧聲","竹子發出的聲音","風吹竹葉聲"], c: 1, n: "注釋2：竹喧：竹林中的喧鬧聲。" },
        { q: "「竹喧歸浣女」中的「浣女」意思是？", a: ["洗衣女子","打水女子","浣紗女子","勞動女子"], c: 0, n: "注釋3：浣女：洗衣女。" },
        { q: "「蓮動下漁舟」中的「下漁舟」意思是？", a: ["走下漁船","漁船順流而下","放下漁船","漁船靠岸"], c: 1, n: "賞析：漁舟歸來，從上流下來。" },

        { q: "「隨意春芳歇」中的「隨意」意思是？", a: ["隨便","任憑","隨心所欲","自然而然"], c: 1, n: "賞析：任憑春天的芳草自然凋謝。" },
        { q: "「王孫自可留」中的「王孫」原指？", a: ["王子","貴族子弟","隱士","詩人自指"], c: 1, n: "注釋4：原指貴族子弟，此處指隱士。" }
    ];
    db["山居秋暝"].items["文章大意"] = [

        { q: "「傾壺而醉。醉則更相枕以卧，卧而夢……覺而起，起而歸」運用了？", a: ["頂真","反覆","對偶","誇張"], c: 0, n: "賞析：頂真句子使句意環環相扣，文氣緊接。" },
        { q: "「其高下之勢，岈然窪然，若垤若穴」運用了？", a: ["比喻","擬人","誇張","借代"], c: 0, n: "將高山比作小土堆，山谷比作蟻穴，是比喻。" },
        { q: "「尺寸千里」運用了？", a: ["誇張","對比","借代","頂真"], c: 0, n: "眼前尺寸之間，實際相隔千里，是誇張手法。" },
        { q: "「紫青繚白」中的「青」「白」借代？", a: ["青山、白水","青草、白雲","青天、白地","青石、白浪"], c: 0, n: "賞析：以青借代山，以白借代水。" },
        { q: "「悠悠乎與顥氣俱，而莫得其涯；洋洋乎與造物者遊，而不知其所窮」運用了？", a: ["對偶與疊字","排比與比喻","頂真與誇張","借代與擬人"], c: 0, n: "「悠悠」「洋洋」疊字，前後句對偶。" },
        { q: "「然後知吾嚮之未始遊，遊於是乎始」中兩個「始」字、兩個「遊」字的反覆出現，作用是？", a: ["突出主題，首尾呼應","增加字數","使句子更長","修辭華麗"], c: 0, n: "賞析：突出「始遊」的文意。" },
        { q: "全文以四個「始」字和四個「遊」字串聯，這種手法是？", a: ["線索貫穿","反覆強調","排比","對偶"], c: 0, n: "賞析：以關鍵字串聯全文，賑絡清晰。" }
    ];

    // ==================== 錯題本與答題邏輯（按題目類型重做） ====================
    let mistakes = JSON.parse(localStorage.getItem('anna_mis')) || [];  // 每條記錄 { ch, cat, q, count }
    
    function recordMistake(ch, cat, qText) {
        let existing = mistakes.find(m => m.ch === ch && m.cat === cat && m.q === qText);
        if(existing) existing.count = (existing.count || 1) + 1;
        else mistakes.push({ ch, cat, q: qText, count: 1 });
        localStorage.setItem('anna_mis', JSON.stringify(mistakes));
    }
    
    function removeMistake(ch, cat, qText) {
        mistakes = mistakes.filter(m => !(m.ch === ch && m.cat === cat && m.q === qText));
        localStorage.setItem('anna_mis', JSON.stringify(mistakes));
    }
    
    // 重做錯題列表（按篇章與類別，一次性抽所有錯題）
    let redoQuestions = [];     // 存放 { qObj, mistakeRecord }
    let redoIndex = 0;
    
    function startRedoByCategory(ch, cat) {
        let catMistakes = mistakes.filter(m => m.ch === ch && m.cat === cat);
        if(catMistakes.length === 0) {
            alert("此篇章此類別暫無錯題！");
            showMistakeListView(ch);
            return;
        }
        redoQuestions = [];
        for(let m of catMistakes) {
            let qObj = db[ch].items[cat].find(item => item.q === m.q);
            if(qObj) redoQuestions.push({ qObj, mistakeRecord: m });
        }
        if(redoQuestions.length === 0) {
            alert("找不到對應的題目數據，請重試。");
            return;
        }
        redoIndex = 0;
        // 顯示重做頁面
        document.querySelectorAll('.mistake-subpage').forEach(div => div.style.display = 'none');
        document.getElementById('mistake-redo').style.display = 'block';
        renderRedoQuestion();
    }
    
    function renderRedoQuestion() {
        if(redoIndex >= redoQuestions.length) {
            alert("🎉 所有錯題已完成！錯題已清除。");
            // 清除當前篇章類別的所有錯題（因為已全部答對）
            let curMistakes = [...redoQuestions.map(r => r.mistakeRecord)];
            for(let m of curMistakes) {
                removeMistake(m.ch, m.cat, m.q);
            }
            showMistakeListView(redoQuestions[0]?.mistakeRecord.ch || "");
            redoQuestions = [];
            return;
        }
        let item = redoQuestions[redoIndex];
        let q = item.qObj;
        let count = item.mistakeRecord.count || 1;
        document.getElementById('redo-counter').innerText = `${redoIndex+1} / ${redoQuestions.length} (本題錯${count}次)`;
        document.getElementById('redo-q-text').innerText = q.q;
        document.getElementById('redo-anna-box').style.display = 'none';
        let optDiv = document.getElementById('redo-options');
        optDiv.innerHTML = "";
        q.a.forEach((txt, i) => {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = txt;
            btn.onclick = () => checkRedo(i, q.c, q.n, btn);
            optDiv.appendChild(btn);
        });
        // 下一題按鈕臨時禁用
        let nextBtn = document.getElementById('redo-next-btn');
        nextBtn.onclick = () => { alert('請先回答當前題目'); };
    }
    
    function checkRedo(idx, correct, note, btn) {
        if(idx === correct) {
            btn.classList.add('correct');
            // 答對則移除當前錯題記錄
            let current = redoQuestions[redoIndex];
            removeMistake(current.mistakeRecord.ch, current.mistakeRecord.cat, current.mistakeRecord.q);
            redoIndex++;
            setTimeout(() => { renderRedoQuestion(); }, 600);
        } else {
            btn.classList.add('wrong');
            document.getElementById('redo-anna-text').innerHTML = note;
            document.getElementById('redo-anna-box').style.display = 'block';
            // 增加錯誤次數
            let current = redoQuestions[redoIndex];
            let m = mistakes.find(m => m.ch === current.mistakeRecord.ch && m.cat === current.mistakeRecord.cat && m.q === current.mistakeRecord.q);
            if(m) m.count = (m.count || 1) + 1;
            else recordMistake(current.mistakeRecord.ch, current.mistakeRecord.cat, current.mistakeRecord.q);
            localStorage.setItem('anna_mis', JSON.stringify(mistakes));
            // 更新顯示的計數
            let newCount = m ? m.count : (current.mistakeRecord.count + 1);
            document.getElementById('redo-counter').innerText = `${redoIndex+1} / ${redoQuestions.length} (本題錯${newCount}次)`;
            // 讓「下一題」按鈕可以重新嘗試（點擊後重新渲染同一題）
            document.getElementById('redo-next-btn').onclick = () => { renderRedoQuestion(); };
        }
    }
    
    // ---- 正常答題邏輯 ----
    let curCh = "", curCat = "", curIdx = 0, totalQ = 0;
    
    function showPage(p) {
        document.querySelectorAll('.page').forEach(d=>d.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('nav-home').classList.remove('active');
        document.getElementById('nav-mis').classList.remove('active');
        if(p==='home') document.getElementById('nav-home').classList.add('active');
    }
    
    function showMistakes() { showPage('mistake'); showMistakeStat(); }
    
    function showMistakeStat() {
        document.querySelectorAll('.mistake-subpage').forEach(d=>d.style.display='none');
        document.getElementById('mistake-stat').style.display='block';
        renderStat();
    }
    
    function showMistakeListView(ch) {
        document.querySelectorAll('.mistake-subpage').forEach(d=>d.style.display='none');
        document.getElementById('mistake-listview').style.display='block';
        document.getElementById('listview-title').innerText = `${ch} 錯題列表`;
        renderMistakeList(ch);
    }
    
    let chart = null;
    function renderStat() {
        let cnt = {}; mistakes.forEach(m=>cnt[m.ch]=(cnt[m.ch]||0)+m.count);
        let labels = Object.keys(cnt), data = labels.map(l=>cnt[l]);
        const ctx = document.getElementById('mistakeChart').getContext('2d');
        if(chart) chart.destroy();
        if(labels.length) chart = new Chart(ctx,{type:'pie',data:{labels,datasets:[{data,backgroundColor:['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#8E5EA2','#CDDC39','#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#FF6384','#36A2EB']}]}});
        else ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
        let grid = document.getElementById('stat-chapter-grid');
        grid.innerHTML = '';
        for(let ch of chapters){
            let t = mistakes.filter(m=>m.ch===ch&&m.cat==='語譯').reduce((s,m)=>s+m.count,0);
            let m = mistakes.filter(m=>m.ch===ch&&m.cat==='文章大意').reduce((s,m)=>s+m.count,0);
            let r = mistakes.filter(m=>m.ch===ch&&m.cat==='修辭手法').reduce((s,m)=>s+m.count,0);
            if(t+m+r===0) continue;
            let div = document.createElement('div'); div.className='stat-card';
            div.onclick = () => showMistakeListView(ch);
            div.innerHTML = `<h4>${ch}</h4><p>語譯:${t} 大意:${m} 修辭:${r}</p>`;
            grid.appendChild(div);
        }
        if(grid.children.length===0) grid.innerHTML='<div style="grid-column:1/-1;text-align:center">暫無錯題，繼續努力！</div>';
    }
    
    function renderMistakeList(ch){
        let arr = mistakes.filter(m=>m.ch===ch);
        let cont = document.getElementById('mistake-list-container'); cont.innerHTML='';
        if(!arr.length){ cont.innerHTML='<div class="weak-box">🎉 此篇章暫無錯題！</div>'; return; }
        // 按類別分組顯示，每個類別一個重做按鈕
        let cats = { "語譯": [], "文章大意": [], "修辭手法": [] };
        for(let m of arr) cats[m.cat].push(m);
        for(let cat of ["語譯","文章大意","修辭手法"]) {
            if(cats[cat].length === 0) continue;
            let groupDiv = document.createElement('div');
            groupDiv.style.marginBottom = '20px';
            groupDiv.style.background = '#faf0e6';
            groupDiv.style.borderRadius = '20px';
            groupDiv.style.padding = '12px';
            groupDiv.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;"><strong>📌 ${cat}</strong><button class="redo-cat-btn" data-cat="${cat}" style="background:#765C55; color:white; border:none; padding:6px 16px; border-radius:40px; cursor:pointer;">重做全部 ${cat} 錯題</button></div><hr style="margin:10px 0">`;
            for(let m of cats[cat]) {
                let div = document.createElement('div'); div.className='mistake-item';
                let c = m.count||1;
                div.style.backgroundColor = `rgba(231,76,60,${Math.min(0.4,0.1+c*0.05)})`;
                div.innerHTML = `<div><strong>${m.cat}</strong>：${m.q}<div style="font-size:0.75rem;color:#e74c3c;">❌ 錯誤 ${c} 次</div></div>`;
                groupDiv.appendChild(div);
            }
            cont.appendChild(groupDiv);
        }
        // 綁定類別重做按鈕
        document.querySelectorAll('.redo-cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let cat = btn.getAttribute('data-cat');
                startRedoByCategory(ch, cat);
            });
        });
    }
    
    function startQuiz(cat){
        curCat = cat; curIdx = 0;
        let arr = db[curCh].items[cat];
        if(!arr || arr.length===0){ alert("此模塊還沒有題目，請完善數據。"); return; }
        totalQ = arr.length; showPage('quiz'); renderQ();
    }
    
    function renderQ(){
        let q = db[curCh].items[curCat][curIdx];
        document.getElementById('q-counter').innerText = `${curIdx+1}/${totalQ}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('anna-box').style.display='none';
        let optDiv = document.getElementById('options'); optDiv.innerHTML='';
        q.a.forEach((txt,i)=>{
            let btn = document.createElement('button'); btn.className='opt-btn'; btn.innerText=txt;
            btn.onclick = ()=>check(i, q.c, q.n, btn);
            optDiv.appendChild(btn);
        });
    }
    
    function check(idx, correct, note, btn) {
        let curQ = db[curCh].items[curCat][curIdx];
        if(idx===correct){ btn.classList.add('correct'); setTimeout(nextQ,800); }
        else{ btn.classList.add('wrong'); document.getElementById('anna-text').innerHTML = note; document.getElementById('anna-box').style.display='block'; recordMistake(curCh, curCat, curQ.q); }
    }
    
    function nextQ(){ curIdx++; if(curIdx<totalQ) renderQ(); else { alert("模塊練習完成！"); showPage('sub'); } }
    
    function openSub(name){ curCh = name; document.getElementById('sub-title').innerText = name; showPage('sub'); }
    
    // 生成目錄
    const listDiv = document.getElementById('chapter-list');
    for(let ch of chapters) listDiv.innerHTML += `<div class="chapter-card" onclick="openSub('${ch}')"><h3>${ch}</h3><p>${db[ch].author}</p></div>`;
    
    // 全局函數暴露
    window.showPage = showPage;
    window.showMistakes = showMistakes;
    window.showMistakeStat = showMistakeStat;
    window.startQuiz = startQuiz;
    window.openSub = openSub;
    window.nextQ = nextQ;
    window.showMistakeListView = showMistakeListView;
</script>
</body>
</html>
